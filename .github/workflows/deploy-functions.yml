name: Deploy Supabase (schema + functions)

# Hands-off backend deploy. Runs automatically whenever anything under
# supabase/ changes on main, and can also be triggered manually.
#
# Secrets used (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  (required)  — personal access token; also applies SQL.
#   ANTHROPIC_API_KEY      (optional)  — needed only to deploy the AI coach.
#
# The database schema is applied through the Supabase Management API using the
# access token you already have — no database password required.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: tbwmckmyzoxzhpqlomsp
    steps:
      - uses: actions/checkout@v4

      - name: Require the Supabase access token
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::error::Missing repo secret SUPABASE_ACCESS_TOKEN"; exit 1; fi

      - name: Detect optional secrets
        id: chk
        run: |
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_anthropic=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_anthropic=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANTHROPIC_API_KEY not set — schema will apply, but the AI coach won't be (re)deployed."
          fi

      # ── Apply the database schema (profiles, leaderboard, RLS, functions) ──
      # Uses the Management API "run query" endpoint with the access token, so
      # no DB password is needed. schema.sql is idempotent, so this is safe to
      # re-run on every push.
      - name: Apply database schema
        run: |
          echo "Applying supabase/schema.sql via the Supabase Management API…"
          PAYLOAD=$(jq -Rs '{query: .}' supabase/schema.sql)
          HTTP=$(curl -sS -w "%{http_code}" -o /tmp/resp.json \
            -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "$PAYLOAD")
          echo "HTTP ${HTTP}"
          echo "----- response -----"; cat /tmp/resp.json; echo
          if [ "${HTTP}" -ge 300 ]; then
            echo "::error::Schema apply failed (HTTP ${HTTP}). See response above."; exit 1; fi
          echo "✅ Database schema applied (leaderboard + profiles + RLS)."

      # ── Deploy Edge Functions ──
      # The CLI is always installed (the access token is required anyway).
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # delete-account needs no extra secret — SUPABASE_URL / SUPABASE_ANON_KEY /
      # SUPABASE_SERVICE_ROLE_KEY are injected into every function by default — so
      # it deploys on every push, gated only on the access token above.
      - name: Deploy the delete-account function
        run: supabase functions deploy delete-account --project-ref "$PROJECT_REF"

      - name: Set the Anthropic key as a server-side function secret
        if: steps.chk.outputs.has_anthropic == 'true'
        run: supabase secrets set ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" --project-ref "$PROJECT_REF"

      - name: Deploy the AI coach function
        if: steps.chk.outputs.has_anthropic == 'true'
        run: supabase functions deploy ai-coach --project-ref "$PROJECT_REF"

      - name: Summary
        run: |
          echo "✅ Schema applied to https://${PROJECT_REF}.supabase.co"
          echo "✅ delete-account deployed → https://${PROJECT_REF}.supabase.co/functions/v1/delete-account"
          if [ "${{ steps.chk.outputs.has_anthropic }}" = "true" ]; then
            echo "✅ ai-coach deployed → https://${PROJECT_REF}.supabase.co/functions/v1/ai-coach"
          else
            echo "ℹ️ AI coach not deployed (add ANTHROPIC_API_KEY to enable it)."
          fi
