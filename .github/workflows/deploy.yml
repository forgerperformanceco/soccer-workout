name: Deploy Yardsmith to GitHub Pages

# Auto-deploys the site on pushes that change SERVED files. Docs (*.md), the
# backend (supabase/), and the native projects (android/, ios/, build tooling)
# don't change what GitHub Pages serves, so they're ignored — this stops a full
# Pages deploy (and the single-file deployment queue) firing on every doc edit.
on:
  # Publishes to GitHub Pages at https://forgerperformanceco.github.io/soccer-workout/
  # on every push to main. (configure-pages enablement:true turns Pages on the
  # first time.) No CNAME → default github.io domain. Set up a custom domain by
  # re-adding a CNAME file + the domain in repo Settings → Pages.
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. cancel-in-progress: true so a newer push supersedes an
# older queued/in-progress deploy (latest wins) instead of stacking into a queue
# that eventually times out — Pages publishes atomically, so cancelling a
# superseded run is safe and never leaves the live site half-updated.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns Pages on automatically the first time.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Stage served files only
        # Publish ONLY what the app serves. Keep the .md strategy/reference docs,
        # the backend (supabase/), the native projects (android/, ios/) and build
        # tooling OFF the public app domain — they're already in the public repo,
        # but there's no reason to serve them at yardsmith.golf. CNAME MUST be
        # kept or the custom domain breaks. Deny-list (not allow-list) so a new
        # served asset is never accidentally dropped.
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude '.git' --exclude '.github' --exclude '_site' \
            --exclude 'node_modules' --exclude 'www' \
            --exclude 'supabase' --exclude 'android' --exclude 'ios' \
            --exclude 'assets' --exclude 'scripts' --exclude 'src' \
            --exclude 'social' \
            --exclude '*.md' --exclude '.env*' --exclude '.gitignore' \
            --exclude 'package.json' --exclude 'package-lock.json' \
            --exclude 'capacitor.config.json' --exclude 'codemagic.yaml' \
            --exclude 'logo-source*.png'
          echo "── Published to Pages ──"; find _site -type f | sort

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
